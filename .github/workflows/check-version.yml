name: Check Version Bump

on:
  pull_request:
    branches: [main]

jobs:
  check-version:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Check version was bumped and files match
        run: |
          MARKETPLACE_VERSION=$(jq -r '.plugins[0].version' .claude-plugin/marketplace.json)
          PLUGIN_VERSION=$(jq -r '.version' .claude-plugin/plugin.json)

          # Check both files have the same version
          if [ "$MARKETPLACE_VERSION" != "$PLUGIN_VERSION" ]; then
            echo "::error::Version mismatch: marketplace.json ($MARKETPLACE_VERSION) != plugin.json ($PLUGIN_VERSION). Both must match."
            exit 1
          fi

          # Check version was bumped vs main
          git checkout origin/main -- .claude-plugin/marketplace.json 2>/dev/null
          MAIN_VERSION=$(jq -r '.plugins[0].version' .claude-plugin/marketplace.json)
          git checkout HEAD -- .claude-plugin/marketplace.json

          if [ "$MARKETPLACE_VERSION" = "$MAIN_VERSION" ]; then
            echo "::error::Version ($MARKETPLACE_VERSION) has not been bumped. Update the version in both marketplace.json and plugin.json before merging."
            exit 1
          fi

          echo "Version bumped: $MAIN_VERSION → $MARKETPLACE_VERSION (both files match)"
